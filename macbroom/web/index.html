<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="csrf-token" content="__CSRF_TOKEN__" />
  <title>MacBroom · macOS 清理工具</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="logo">🧹</div>
        <div class="brand-text">
          <h1>MacBroom</h1>
          <span data-i18n="brandTagline">安全、可视化的 macOS 清理工具</span>
        </div>
      </div>
      <div class="summary">
        <div class="summary-num" id="grand-total">—</div>
        <div class="summary-label" data-i18n="summaryLabel">检测到可清理</div>
      </div>
      <div class="actions">
        <label class="risk-toggle">
          <input type="checkbox" id="show-risky" />
          <span data-i18n="showRisky">显示高风险项</span>
        </label>
        <label class="lang-select">
          <span data-i18n="languageLabel">语言</span>
          <select id="language-select" aria-label="Language">
            <option value="zh">中文</option>
            <option value="en">English</option>
          </select>
        </label>
        <button id="settings-btn" class="icon-btn" title="设置" aria-label="Settings">⚙</button>
        <button id="scan-all" class="btn btn-primary">
          <span class="dot"></span> 开始扫描
        </button>
      </div>
    </header>

    <nav class="tabs" id="tabs"></nav>

    <main id="panels"></main>

    <div class="empty-state" id="empty-state">
      <div class="empty-illo">🔍</div>
      <h2 data-i18n="emptyTitle">点击「开始扫描」</h2>
      <p data-i18n="emptyBody">MacBroom 会在本机检测可释放的空间，全部操作仅在本地完成，默认移入废纸篓可还原。</p>
    </div>
  </div>

  <footer class="actionbar" id="actionbar">
    <div class="sel-info">
      <span data-i18n="selectedPrefix">已选</span> <strong id="sel-count">0</strong> <span data-i18n="selectedUnit">项</span> · <strong id="sel-size">0 B</strong>
    </div>
    <div class="actionbar-right">
      <label class="hint" data-i18n="deleteHint">删除将移入废纸篓（命令类项会直接执行）</label>
      <button id="delete-btn" class="btn btn-danger" disabled data-i18n="deleteSelected">清理选中项</button>
    </div>
  </footer>

  <!-- 结果弹窗 -->
  <div class="modal-mask" id="modal-mask">
    <div class="modal">
      <div class="modal-head">
        <h3 id="modal-title">清理结果</h3>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-foot" id="modal-foot">
        <button class="btn" id="modal-ok" data-i18n="done">完成</button>
      </div>
    </div>
  </div>

  <!-- 设置：扫描类别开关 -->
  <div class="modal-mask" id="settings-mask">
    <div class="modal">
      <div class="modal-head">
        <h3 data-i18n="settingsTitle">扫描类别</h3>
        <button class="modal-close" id="settings-close">✕</button>
      </div>
      <div class="modal-body">
        <p class="settings-hint" data-i18n="settingsHint">选择要扫描的类别，关闭的类别不会被扫描。</p>
        <div id="settings-list"></div>
        <h4 class="settings-subhead" data-i18n="excludedTitle">排除清单</h4>
        <p class="settings-hint" data-i18n="excludedHint">被排除的项不会被扫描或删除。常用于排除误判项。</p>
        <div id="excluded-list"></div>
      </div>
      <div class="modal-foot">
        <button class="btn btn-primary" id="settings-done" data-i18n="done">完成</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="/app.js"></script>
</body>
</html>
